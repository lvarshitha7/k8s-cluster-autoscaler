apiVersion: apps/v1
kind: Deployment
metadata:
name: express-api
spec:
replicas: 2
selector:
matchLabels:
app: express-api
template:
metadata:
labels:
app: express-api
spec:
containers:- name: express-api
image: lvarshitha7/k8s-express-api:v1
ports:- containerPort: 3000
resources:
requests:
cpu: 100m
memory: 128Mi
limits:
cpu: 300m
memory: 256Mi